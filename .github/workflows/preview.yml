name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]

# Cancel in-flight previews for the same PR when a new commit lands
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  VERCEL_CLI_VERSION: vercel@54

jobs:
  preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Vercel CLI
        run: npm i -g ${{ env.VERCEL_CLI_VERSION }}

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=preview

      - name: Build preview
        run: vercel build

      - name: Deploy preview
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt)
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Comment preview URL on PR
        uses: actions/github-script@v8
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.deployment_url }}
        with:
          script: |
            const url = process.env.DEPLOYMENT_URL;
            const sha = context.sha.slice(0, 7);
            const body = `🔍 Preview deployment ready for \`${sha}\`\n\n→ ${url}\n\n*Updates on every push to this PR. The "E2E Tests" check gates merge.*`;

            // Update an existing preview comment if it exists; otherwise post one.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              (c) => c.user.type === 'Bot' && c.body && c.body.includes('Preview deployment ready'),
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
