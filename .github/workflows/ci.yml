name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VERCEL_CLI_VERSION: vercel@54

jobs:
  test:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build app
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    name: Deploy (staging + conditional production)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Vercel CLI
        run: npm i -g ${{ env.VERCEL_CLI_VERSION }}

      - name: Pull Vercel environment info
        run: vercel pull --yes --environment=production

      - name: Build for production
        run: vercel build --prod

      - name: Deploy build to Vercel (skip-domain so prod isn't reassigned yet)
        id: deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --skip-domain)
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOYMENT_URL"

      - name: Alias deployment to staging.bistrosaimaa.fi
        run: vercel alias set "${{ steps.deploy.outputs.deployment_url }}" staging.bistrosaimaa.fi

      - name: Decide whether to auto-promote
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
          MESSAGE: ${{ github.event.head_commit.message }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          # Auto-promote to production if any of:
          #   - the actor triggering the run is dependabot
          #   - commit message starts with chore(deps)
          #   - commit landed on main without a PR (direct admin push)
          PR_COUNT=$(gh api "repos/$REPO/commits/$SHA/pulls" --jq 'length')

          SHOULD_PROMOTE=false
          if [ "$ACTOR" = "dependabot[bot]" ]; then
            SHOULD_PROMOTE=true
            echo "::notice::Auto-promoting: dependabot actor"
          elif printf '%s' "$MESSAGE" | head -n1 | grep -qE '^chore\(deps'; then
            SHOULD_PROMOTE=true
            echo "::notice::Auto-promoting: chore(deps) commit"
          elif [ "$PR_COUNT" = "0" ]; then
            SHOULD_PROMOTE=true
            echo "::notice::Auto-promoting: direct push to main (no associated PR)"
          else
            echo "::notice::Staging only. Publish a GitHub Release to promote to production."
          fi

          echo "should_promote=$SHOULD_PROMOTE" >> "$GITHUB_OUTPUT"

      - name: Promote deployment to production
        if: steps.gate.outputs.should_promote == 'true'
        run: vercel promote "${{ steps.deploy.outputs.deployment_url }}"
